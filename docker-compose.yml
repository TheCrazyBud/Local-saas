version: '3.8'

services:
  control-plane:
    build: 
      context: ./control-plane
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - llm-gateway

  llm-gateway:
    build:
      context: ./data-plane/llm-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=byoc_data
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - ollama
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  hr-agent:
    build:
      context: ./data-plane/agents
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - llm-gateway

  postgres:
    image: ankane/pgvector
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=byoc_data
    volumes:
      - pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  ollama_data:
